---
# Vault decryption demonstration playbook
#
# NOTE: This playbook demonstrates Ansible Vault concepts but CANNOT run successfully
# because:
# 1. The vault password file is not included in the repository (for security)
# 2. The inventory hosts (db-staging, web-staging, etc.) don't actually exist
# 3. The actual deployment uses Kubernetes secrets, not Ansible Vault
#
# This file is kept for REFERENCE ONLY to show:
# - How Ansible Vault would be used in a VM-based deployment
# - The structure of encrypted variable files in group_vars/
# - The naming convention for vault variables (vault_*)
#
# To decrypt vault files manually, you would need the vault password:
#   ansible-vault view group_vars/staging/vault.yml --ask-vault-pass
#
# The encrypted files contain variables like:
# - group_vars/staging/vault.yml: vault_staging_db_password, vault_staging_secret_key
# - group_vars/production/vault.yml: vault_production_db_password, vault_production_secret_key
# - group_vars/db/vault.yml: vault_db_name, vault_db_user, vault_db_password
#
# For actual deployments, this project uses:
# - Docker Compose for staging (environment variables with defaults)
# - Kubernetes Secrets for production (managed by Terraform)
#
# ============================================================================
# DEMONSTRATION PLAYBOOK (NON-FUNCTIONAL)
# ============================================================================

- name: Demonstrate Database Vault Variables
  hosts: db
  connection: local
  gather_facts: false

  tasks:
    - name: Show database vault variables (from group_vars/db/vault.yml)
      debug:
        msg: |
          Database Name: {{ vault_db_name | default('not defined') }}
          Database User: {{ vault_db_user | default('not defined') }}
          Password Length: {{ vault_db_password | default('') | length }} characters
          Monitoring User: {{ vault_monitoring_db_user | default('not defined') }}
      when: vault_db_password is defined

- name: Demonstrate Staging Vault Variables
  hosts: staging
  connection: local
  gather_facts: false

  tasks:
    - name: Show staging vault variables (from group_vars/staging/vault.yml)
      debug:
        msg: |
          Staging DB Password Length: {{ vault_staging_db_password | default('') | length }} characters
          Staging Secret Key Length: {{ vault_staging_secret_key | default('') | length }} characters
          Staging Slack Webhook: {{ vault_staging_monitoring_slack_webhook | default('not defined') }}
      when: vault_staging_db_password is defined

- name: Demonstrate Production Vault Variables
  hosts: production
  connection: local
  gather_facts: false

  tasks:
    - name: Show production vault variables (from group_vars/production/vault.yml)
      debug:
        msg: |
          Production DB Password Length: {{ vault_production_db_password | default('') | length }} characters
          Production Secret Key Length: {{ vault_production_secret_key | default('') | length }} characters
      when: vault_production_db_password is defined
