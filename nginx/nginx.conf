# Nginx Base Configuration
# Server blocks and upstream are provided by Kubernetes ConfigMaps in production
# For local/Docker Compose, they should be in conf.d/ directory

# Running as non-root user (nginx-app), no user directive needed
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Include all server configurations from conf.d
    # (mounted from Kubernetes ConfigMaps in production)
    include /etc/nginx/conf.d/*.conf;
}
